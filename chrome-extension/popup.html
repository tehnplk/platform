<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PLK Platform Chat</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>PLK Chat</h1>
          <p id="status">Loading...</p>
        </div>
        <div id="count">0</div>
      </header>

      <label>
        Server URL
        <input id="baseUrl" type="url" spellcheck="false" />
      </label>

      <div class="actions">
        <button id="openAdmin" type="button">Open Admin</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
